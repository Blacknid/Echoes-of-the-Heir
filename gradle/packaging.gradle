// Packaging pipeline for the desktop build. Applied from desktop/build.gradle.
//
// Tasks:
//   gradlew :desktop:jar           → deploy/Michi-s-adventure.jar (fat, runnable via DesktopLauncher)
//   gradlew :desktop:jpackageImage → jpackage_tmp/MichisAdventure/MichisAdventure.exe (+ copy to deploy)
//   gradlew :desktop:installer     → deploy/MichiGame_Setup.exe (umbrella: jar→jpackage→Inno)
//
// Requires on PATH/installed: JDK jpackage, Inno Setup 6 (ISCC).
// Each is checked; missing optional tools warn instead of failing.

import org.gradle.internal.os.OperatingSystem

def rootDir       = rootProject.projectDir
def buildToolsDir = new File(rootDir, 'build_tools')
def deployDir     = new File(rootDir, 'deploy')
def jpackageTmp   = new File(rootDir, 'jpackage_tmp')
def appName       = 'MichisAdventure'
def jarName       = 'Michi-s-adventure.jar'
def mainClass     = 'desktop.DesktopLauncher'
def appVersion    = project.gameVersion.version

// Put the fat JAR in deploy/ with the legacy name so jpackage/Inno paths are unchanged.
jar {
    destinationDirectory = deployDir
}

// ── jpackage app-image (.exe with bundled JRE). ──
tasks.register('jpackageImage') {
    group = 'packaging'
    description = 'Build the Windows app-image (.exe) with jpackage from the fat JAR.'
    dependsOn tasks.named('jar')
    doLast {
        deployDir.mkdirs()
        if (jpackageTmp.exists()) jpackageTmp.deleteDir()
        jpackageTmp.mkdirs()

        def jpackage = "${System.getProperty('java.home')}/bin/jpackage" +
                       (OperatingSystem.current().isWindows() ? '.exe' : '')
        if (!new File(jpackage).exists()) {
            logger.warn("[packaging] jpackage not found at ${jpackage} — skipping .exe. Fat JAR is in deploy/.")
            return
        }
        // Gradle 9 removed Project.exec at execution time — use ProcessBuilder directly.
        def pb = new ProcessBuilder(jpackage,
            '--input',       deployDir.absolutePath,
            '--name',        appName,
            '--main-jar',    jarName,
            '--main-class',  mainClass,
            '--type',        'app-image',
            '--dest',        jpackageTmp.absolutePath,
            '--app-version', appVersion,
            '--java-options', '-XX:+UseG1GC -XX:MaxGCPauseMillis=5')
        pb.inheritIO()
        pb.start().waitFor()

        def exe = new File(jpackageTmp, "${appName}/${appName}.exe")
        if (exe.exists()) {
            def out = new File(deployDir, "${appName}-${appVersion}.exe")
            java.nio.file.Files.copy(exe.toPath(), out.toPath(),
                java.nio.file.StandardCopyOption.REPLACE_EXISTING)
            logger.lifecycle("[packaging] EXE: deploy/${appName}-${appVersion}.exe")
        } else {
            logger.warn('[packaging] jpackage did not produce an EXE (see output above).')
        }
    }
}

// ── Inno Setup installer (wraps the app-image). ──
tasks.register('innoInstaller') {
    group = 'packaging'
    description = 'Build deploy/MichiGame_Setup.exe via Inno Setup (ISCC).'
    dependsOn tasks.named('jpackageImage')
    doLast {
        def iss = new File(buildToolsDir, 'setup_init.iss')
        if (!iss.exists()) { logger.warn('[packaging] setup_init.iss missing — skipping installer.'); return }

        // Locate ISCC.
        def iscc = ['C:/Program Files (x86)/Inno Setup 6/ISCC.exe',
                    'C:/Program Files/Inno Setup 6/ISCC.exe']
                   .collect { new File(it) }.find { it.exists() }?.absolutePath
        if (iscc == null) {
            logger.warn('[packaging] Inno Setup (ISCC.exe) not found — skipping installer. Get it: https://jrsoftware.org/isdl.php')
            return
        }
        def pb = new ProcessBuilder(iscc, iss.absolutePath); pb.inheritIO()
        def exitCode = pb.start().waitFor()
        if (exitCode != 0) {
            throw new GradleException("[packaging] ISCC failed with exit code ${exitCode} — see output above.")
        }
        def out = new File(deployDir, 'MichiGame_Setup.exe')
        if (out.exists()) {
            logger.lifecycle('[packaging] Installer: deploy/MichiGame_Setup.exe')
        } else {
            throw new GradleException('[packaging] ISCC reported success but deploy/MichiGame_Setup.exe was not produced.')
        }
    }
}

// Umbrella task: full source → installer pipeline.
tasks.register('installer') {
    group = 'packaging'
    description = 'Full desktop packaging: fat JAR → jpackage .exe → Inno Setup installer.'
    dependsOn tasks.named('innoInstaller')
}
